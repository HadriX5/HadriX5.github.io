			href="/assets/icons/favicon_black.svg"
			type="image/svg+xml"
			media="(prefers-color-scheme: light)"
		/>
		<link
			rel="icon"
			href="/assets/icons/favicon_white.svg"
			type="image/svg+xml"

		/>

			href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<canvas id="bg-sphere"></canvas>
		<nav>
			<a class="logo" href="/">
				<video id="logo-video" autoplay muted loop playsinline>
					<source
						src="/assets/videos/black_BG.mp4"
						type="video/mp4"
					/>
				</video>
			</a>
			<ul>
				<li><a href="/">Home</a></li>
				<li><a href="/assets/html/about.html">About Me</a></li>
				<li><a href="/assets/html/projects.html">Projects</a></li>
				<li><a href="/assets/html/contact.html">Contact Me</a></li>
				<li>
					<button id="theme-toggle" aria-label="Toggle dark mode">
						<img
							src="/assets/icons/Moon.svg"
							alt="Dark Mode"
							id="theme-icon"
						/>
					</button>
				</li>
			</ul>
		</nav>

		<footer>
			<p>&copy; 2026 Adrià Suárez Batllori. All rights reserved.</p>
			<div class="github-link">
				<span>Please visit my github at:</span>
				<a
					target="_blank"
					rel="noopener noreferrer"
					href="https://github.com/HadriX5"
				>
					<img
						id="github-icon"
						src="/assets/icons/GitHub_Black.svg"
						alt="GitHub"
					/>
					<span>My GitHub</span>
				</a>
			</div>
			<p>
				For any inquiries, please see:
				<a href="/assets/html/contact.html" class="contact-btn"
					>Contact me</a
				>
			</p>
		</footer>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
		<script src="/assets/js/sphere.js"></script>
		<script src="/assets/js/theme.js"></script>
		<script>
			let btn = document.getElementById("to_top_button");

			window.onscroll = function () {
				scrollFunction();
			};

			function scrollFunction() {
				if (
					document.body.scrollTop > 20 ||
					document.documentElement.scrollTop > 20
				) {
					btn.style.display = "block";
				} else {
					btn.style.display = "none";
				}
			}

			function topFunction() {
				document.body.scrollTop = 0; /* For IOS */
				document.documentElement.scrollTop = 0;
			}
		</script>
	</body>
</html>
